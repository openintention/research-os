types:
  ParticipantRole:
    values:
      - contributor
      - verifier

  LeaseState:
    values:
      - available
      - acquired
      - renewed
      - released
      - completed
      - failed
      - expired

  NodeCapability:
    values:
      - event_append
      - lease_acquire
      - lease_renew
      - lease_release
      - verify_claim
      - explore_effort
      - publish_summary

  NodeIdentity:
    fields:
      node_id: string
      identity_schema: string
      identity_version: integer
      display_name: string
      signing_keys: array
      capabilities: array
      created_at: datetime

  NetworkEnvelope:
    fields:
      envelope_id: string
      envelope_schema: string
      envelope_version: integer
      message_type: string
      sender_node_id: string
      sender_key_id: string
      sent_at: datetime
      payload_schema: string
      payload_digest: string
      payload: object
      signature: string
      signature_scheme: string

  Lease:
    fields:
      lease_id: string
      lease_schema: string
      lease_version: integer
      work_item_type: string
      participant_role: string
      subject_type: string
      subject_id: string
      planner_fingerprint: string
      status: string
      holder_node_id: string?
      holder_workspace_id: string?
      max_duration_seconds: integer
      renewal_count: integer
      acquired_at: datetime?
      renewed_at: datetime?
      released_at: datetime?
      completed_at: datetime?
      failed_at: datetime?
      failure_reason: string?
      observed_run_id: string?
      observed_claim_id: string?
      stale_completion: boolean
      expires_at: datetime

  EventEnvelope:
    fields:
      event_id: string
      kind: string
      occurred_at: datetime
      workspace_id: string?
      aggregate_id: string?
      aggregate_kind: string?
      actor_id: string?
      payload: object
      tags: object

events:
  effort.registered:
    description: Registers a seeded shared effort that workspaces can join.
    required_payload:
      - effort_id
      - name
      - objective
      - platform
      - budget_seconds
    optional_payload:
      - summary
      - tags

  workspace.started:
    description: Creates a new workspace.
    required_payload:
      - name
      - objective
      - platform
      - budget_seconds
    optional_payload:
      - effort_id
      - description
      - tags
      - participant_role

  snapshot.published:
    description: Publishes an immutable snapshot into a workspace with optional artifact-plane references.
    required_payload:
      - snapshot_id
    optional_payload:
      - parent_snapshot_ids
      - artifact_uri
      - source_bundle_digest
      - git_ref
      - notes

  run.completed:
    description: Publishes the result of a run for a snapshot.
    required_payload:
      - run_id
      - snapshot_id
      - objective
      - platform
      - budget_seconds
      - metric_name
      - metric_value
      - direction
      - status
    optional_payload:
      - dataset
      - seed
      - notes
      - artifact_uri
      - wall_time_seconds

  claim.asserted:
    description: States a research claim backed by evidence.
    required_payload:
      - claim_id
      - statement
      - claim_type
      - candidate_snapshot_id
      - objective
      - platform
    optional_payload:
      - baseline_snapshot_id
      - evidence_run_ids
      - metric_name
      - delta
      - confidence

  claim.reproduced:
    description: Adds supporting evidence for a claim, often from a separate verifier workspace.
    required_payload:
      - claim_id
      - evidence_run_id
    optional_payload:
      - notes

  claim.contradicted:
    description: Adds contradicting evidence for a claim.
    required_payload:
      - claim_id
      - evidence_run_id
    optional_payload:
      - notes

  adoption.recorded:
    description: Records a workspace adopting a finding from another line of work.
    required_payload:
      - subject_type
      - subject_id
    optional_payload:
      - from_workspace_id
      - reason

  summary.published:
    description: Publishes a human-facing summary derived from control-plane state.
    required_payload:
      - summary_id
      - title
      - format
    optional_payload:
      - body
      - artifact_uri
